<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 720" width="390" height="720">
  <!-- Background -->
  <rect width="390" height="720" fill="#0a0e1a"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#080c14"/>
  <text x="20" y="28" font-family="monospace" font-size="12" fill="#94a3b8">9:41</text>
  <text x="340" y="28" font-family="monospace" font-size="12" fill="#94a3b8">●●●</text>

  <!-- Header -->
  <rect width="390" height="64" y="44" fill="#0d1220"/>
  <text x="50" y="84" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">Payment Processing</text>
  <text x="20" y="82" font-family="monospace" font-size="18" fill="#0ea5e9">←</text>

  <!-- Processing animation ring -->
  <circle cx="195" cy="270" r="80" fill="none" stroke="#1e293b" stroke-width="6"/>
  <circle cx="195" cy="270" r="80" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-dasharray="320 180" stroke-linecap="round" transform="rotate(-90 195 270)"/>
  <circle cx="195" cy="270" r="60" fill="#0ea5e9" opacity="0.08"/>

  <!-- Checkmark / icon -->
  <circle cx="195" cy="270" r="36" fill="#0ea5e9" opacity="0.15"/>
  <text x="176" y="282" font-family="monospace" font-size="32" fill="#0ea5e9">⚡</text>

  <!-- Gate info -->
  <text x="195" y="390" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">CCLEX Main Gate</text>
  <text x="195" y="415" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="2">LOCATION DETECTED</text>

  <!-- Amount card -->
  <rect x="60" y="440" width="270" height="90" rx="4" fill="#0d1220" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
  <text x="195" y="468" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="2">TOLL AMOUNT</text>
  <text x="195" y="512" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#0ea5e9" text-anchor="middle">₱ 72.00</text>

  <!-- Processing status -->
  <rect x="95" y="552" width="200" height="32" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="115" cy="568" r="5" fill="#0ea5e9" opacity="0.9"/>
  <text x="128" y="573" font-family="monospace" font-size="11" fill="#0ea5e9">Processing payment...</text>

  <!-- From account -->
  <text x="195" y="618" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">Deducting from wallet  ·  Balance: ₱ 245</text>

  <!-- Divider -->
  <line x1="40" y1="638" x2="350" y2="638" stroke="#1e293b" stroke-width="1"/>

  <!-- Info row -->
  <text x="40" y="662" font-family="monospace" font-size="10" fill="#475569">Vehicle</text>
  <text x="350" y="662" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="end">ABC 1234</text>
  <text x="40" y="682" font-family="monospace" font-size="10" fill="#475569">Method</text>
  <text x="350" y="682" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="end">Tollfast Wallet</text>
  <text x="40" y="702" font-family="monospace" font-size="10" fill="#475569">Time</text>
  <text x="350" y="702" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="end">08:42:17 AM</text>
</svg>
